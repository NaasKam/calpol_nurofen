
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Dose Pro</title>
<style>
body{font-family:-apple-system;background:#f2f2f7;padding:20px}
.card{background:white;padding:20px;border-radius:18px}
button{width:100%;padding:15px;margin:8px;border-radius:12px}
</style>
</head>
<body>
<div class="card">
<h2>Calpol & Nurofen Scheduler Pro</h2>

<button onclick="dose('Calpol',6)">Give Calpol Now</button>
<button onclick="dose('Nurofen',8)">Give Nurofen Now</button>

<h3>Next Dose</h3>
<div id="next"></div>

<h3>History</h3>
<div id="history"></div>

<button onclick="exportData()">Export History</button>
</div>

<script>
if('serviceWorker' in navigator)
navigator.serviceWorker.register('service-worker.js');

if('Notification' in window)
Notification.requestPermission();

let log=JSON.parse(localStorage.getItem('log')||'[]');

function dose(name,h){
let now=new Date();
let next=new Date(Date.now()+h*3600000);

log.push({name:name,time:now,next:next});
localStorage.setItem('log',JSON.stringify(log));

draw();
}

function draw(){
history.innerHTML='';
next.innerHTML='';

log.forEach(x=>{
history.innerHTML+=x.name+' - '+new Date(x.time).toLocaleString()+'<br>';
});

log.slice(-2).forEach(x=>{
next.innerHTML+=x.name+' due '+new Date(x.next).toLocaleString()+'<br>';
});
}

setInterval(()=>{
let now=new Date();
log.forEach(x=>{
if(!x.done && now>=new Date(x.next)){
navigator.serviceWorker.ready.then(r=>
r.showNotification(x.name+' due'));
x.done=true;
localStorage.setItem('log',JSON.stringify(log));
}
});
},60000);

function exportData(){
let blob=new Blob([JSON.stringify(log)]);
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='dose-history.json';
a.click();
}

draw();
</script>
</body>
</html>

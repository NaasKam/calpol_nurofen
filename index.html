<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">

<title>Dose Scheduler</title>

<style>

body{
font-family:-apple-system;
background:#f2f2f7;
padding:20px
}

.card{
background:white;
border-radius:22px;
padding:20px;
margin-bottom:15px
}

button{
width:100%;
padding:16px;
border:0;
border-radius:18px;
margin:8px 0;
color:white;
font-size:17px;
transition:all .25s ease;
}

button:active{
transform:scale(.94);
filter:brightness(1.25);
}

.clicked{
box-shadow:0 0 20px #34c759;
transform:scale(1.03);
}

.red{background:#d62828}
.orange{background:#f77f00}
.blue{background:#007aff}
.grey{background:#555}

.item{
background:#eee;
padding:10px;
border-radius:12px;
margin:5px
}

.timer{
font-size:34px;
font-weight:bold;
text-align:center
}

.flash{
animation:pulse .6s;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="card">

<h2>💊 Dose Scheduler</h2>

<button class="red" onclick="tap(this);give('Calpol')">
🔴 Give Calpol Now
</button>

<button class="orange" onclick="tap(this);give('Nurofen')">
🟠 Give Nurofen Now
</button>

<button class="blue" onclick="tap(this);generatePlan()">
📅 Generate 24 Hour Plan
</button>

</div>


<div class="card">

<h3>⏰ Next Dose</h3>

<div id="next"></div>

<div class="timer" id="timer">--</div>

</div>


<div class="card">

<h3>📅 Plan</h3>

<div id="plan"></div>

<button class="blue" onclick="tap(this);exportPDF()">
📄 Export Plan PDF
</button>

</div>


<div class="card">

<h3>📖 History</h3>

<div id="history"></div>

<button class="grey" onclick="tap(this);clearHistory()">
🗑 Delete History
</button>

</div>


<script>

let doses=JSON.parse(localStorage.doses||"[]");
let planData=[];


function tap(btn){

btn.classList.add("clicked");

setTimeout(()=>{
btn.classList.remove("clicked");
},400);

}


function give(type){

let now=new Date();

doses.push({
type:type,
time:now.toISOString()
});

localStorage.doses=JSON.stringify(doses);

drawHistory();

generatePlan();

}


function generatePlan(){

planData=[];

let calpol=[...doses]
.reverse()
.find(x=>x.type=="Calpol");

if(!calpol)return;


let end=new Date(Date.now()+86400000);


let c=new Date(calpol.time);

while(c<=end){

planData.push({
type:"Calpol",
time:new Date(c)
});

c.setHours(c.getHours()+6);

}


let n=new Date(calpol.time);

n.setHours(n.getHours()+2);


while(n<=end){

planData.push({
type:"Nurofen",
time:new Date(n)
});

n.setHours(n.getHours()+8);

}


planData=planData
.filter(x=>x.time>new Date())
.sort((a,b)=>a.time-b.time);


plan.innerHTML="";

planData.forEach(x=>{

plan.innerHTML+=
"<div class=item>"+
(x.type=="Calpol"?"🔴 ":"🟠 ")+
x.time.toLocaleString()+
" "+x.type+
"</div>";

});

}


setInterval(()=>{

if(planData.length){

let x=planData[0];

let diff=x.time-new Date();

if(diff>0){

timer.innerHTML=
Math.floor(diff/3600000)+"h "+
Math.floor(diff%3600000/60000)+"m "+
Math.floor(diff%60000/1000)+"s";

next.innerHTML=
(x.type=="Calpol"?"🔴 ":"🟠 ")+x.type;

}

}

},1000);


function drawHistory(){

history.innerHTML="";

doses.forEach(x=>{

history.innerHTML+=
"<div class=item>"+
x.type+" "+
new Date(x.time).toLocaleString()
+"</div>";

});

}


function exportPDF(){

let w=window.open();

w.document.write("<pre>"+
JSON.stringify(planData,null,2)
+"</pre>");

w.print();

}


function clearHistory(){

doses=[];
localStorage.doses="[]";

drawHistory();

plan.innerHTML="";
timer.innerHTML="--";

}


drawHistory();
generatePlan();

</script>

</body>
</html>

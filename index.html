<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CalNur">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">

<title>CalNur</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:20px}
.card{background:white;border-radius:22px;padding:20px;margin-bottom:15px}
button{
width:100%;padding:16px;border:0;border-radius:18px;
margin:8px 0;color:white;font-size:17px;transition:.25s
}
button:active{transform:scale(.94);filter:brightness(1.2)}
.red{background:#d62828}
.orange{background:#f77f00}
.blue{background:#007aff}
.grey{background:#555}
.item{background:#eee;padding:12px;border-radius:12px;margin:6px}
.timer{text-align:center;font-size:32px;font-weight:bold}

.credit{
text-align:center;
font-size:9px;
opacity:.45;
margin-top:30px;
}
</style>
</head>

<body>

<div class="card">

<h2>💊 CalNur</h2>

<button class="red" onclick="startPlan('calpol')">
🔴 Start Calpol Plan
</button>

<button class="orange" onclick="startPlan('nurofen')">
🟠 Start Nurofen Plan
</button>

<button class="blue" onclick="startPlan('both')">
🔴🟠 Start Calpol + Nurofen Plan
</button>

</div>


<div class="card">

<h3>⏰ Next Dose</h3>
<div id="next"></div>
<div class="timer" id="timer">--</div>

</div>


<div class="card">

<h3>📅 24 Hour Plan</h3>
<div id="plan"></div>

<button class="blue" onclick="exportPDF()">📄 Export PDF</button>
<button class="grey" onclick="clearPlan()">🗑 Clear Plan</button>

</div>


<div class="credit">
Created by AI genius Kamil K
</div>


<script>

let planData=JSON.parse(localStorage.plan||"[]");


function startPlan(type){

let now=new Date();
let end=new Date(Date.now()+86400000);

planData=[];

if(type=="calpol"||type=="both"){

let c=new Date(now);

while(c<=end){

planData.push({type:"Calpol",time:c.toISOString()});
c.setHours(c.getHours()+6);

}

}


if(type=="nurofen"){

let n=new Date(now);

while(n<=end){

planData.push({type:"Nurofen",time:n.toISOString()});
n.setHours(n.getHours()+8);

}

}


if(type=="both"){

let n=new Date(now);
n.setHours(n.getHours()+2);

while(n<=end){

planData.push({type:"Nurofen",time:n.toISOString()});
n.setHours(n.getHours()+8);

}

}


planData.sort((a,b)=>new Date(a.time)-new Date(b.time));

localStorage.plan=JSON.stringify(planData);

draw();

}


function draw(){

plan.innerHTML="";

planData.forEach(x=>{

plan.innerHTML +=
"<div class=item>"+
(x.type=="Calpol"?"🔴 ":"🟠 ")+
new Date(x.time).toLocaleString()+
" - "+x.type+
"</div>";

});

}


setInterval(()=>{

let upcoming=planData.filter(x=>new Date(x.time)>new Date())[0];

if(upcoming){

let diff=new Date(upcoming.time)-new Date();

next.innerHTML=(upcoming.type=="Calpol"?"🔴 ":"🟠 ")+upcoming.type;

timer.innerHTML=
Math.floor(diff/3600000)+"h "+
Math.floor(diff%3600000/60000)+"m "+
Math.floor(diff%60000/1000)+"s";

}

},1000);


function exportPDF(){

let w=window.open();

let text="CalNur 24 Hour Plan\n\n";

planData.forEach(x=>{
text+=new Date(x.time).toLocaleString()+" - "+x.type+"\n";
});

w.document.write("<pre>"+text+"</pre>");
w.print();

}


function clearPlan(){

planData=[];
localStorage.plan="[]";
draw();
timer.innerHTML="--";

}


draw();

</script>

</body>
</html>

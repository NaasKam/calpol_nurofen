<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CalNur</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:20px}
.card{background:white;border-radius:22px;padding:20px;margin-bottom:15px}
button{width:100%;padding:15px;border:0;border-radius:16px;margin:6px;color:white;font-size:16px}
.red{background:#d62828}
.orange{background:#f77f00}
.blue{background:#007aff}
.green{background:#34c759}
.grey{background:#555}

.picker{
display:flex;
justify-content:center;
gap:20px;
font-size:42px;
font-weight:bold;
}

select{
font-size:38px;
height:90px;
border:0;
background:#eee;
border-radius:15px;
text-align:center;
}

.item{
background:#eee;
border-radius:12px;
padding:10px;
margin:6px
}

.timer{
font-size:32px;
text-align:center;
font-weight:bold
}

.credit{
font-size:9px;
opacity:.45;
text-align:center
}
</style>
</head>

<body>

<div class="card">

<h2>🗒 Start Time</h2>

<div class="picker">

<select id="hour"></select>
:
<select id="minute"></select>

</div>

<button class="green" onclick="setNow()">
Use Current Time
</button>

</div>


<div class="card">

<h2>💊 CalNur</h2>

<button class="red" onclick="createPlan('calpol')">
🔴 Start Calpol Plan
</button>

<button class="orange" onclick="createPlan('nurofen')">
🟠 Start Nurofen Plan
</button>

<button class="blue" onclick="createPlan('both')">
🔴🟠 Start Calpol + Nurofen Plan
</button>

</div>


<div class="card">

<h3>⏰ Next Dose</h3>

<div id="next"></div>

<div class="timer" id="timer">--</div>

</div>


<div class="card">

<h3>📅 Checklist</h3>

<div id="plan"></div>

</div>


<div class="credit">
Created by AI genius Kamil K
</div>


<script>

let doses=JSON.parse(localStorage.doses||"[]");


// create iOS style wheels

for(let i=0;i<24;i++){

hour.innerHTML+=
"<option>"+String(i).padStart(2,'0')+"</option>";

}

for(let i=0;i<60;i++){

minute.innerHTML+=
"<option>"+String(i).padStart(2,'0')+"</option>";

}


function setNow(){

let d=new Date();

hour.value=String(d.getHours()).padStart(2,'0');

minute.value=String(d.getMinutes()).padStart(2,'0');

}


setNow();


function selectedTime(){

let d=new Date();

d.setHours(hour.value);

d.setMinutes(minute.value);

d.setSeconds(0);

return d;

}


function createPlan(type){

let start=selectedTime();

let end=new Date(start);

end.setHours(end.getHours()+24);

doses=[];


if(type=="calpol"||type=="both"){

let c=new Date(start);

while(c<=end){

doses.push({
med:"Calpol",
time:c.toISOString(),
done:false,
skip:false
});

c.setHours(c.getHours()+6);

}

}


if(type=="nurofen"){

let n=new Date(start);

while(n<=end){

doses.push({
med:"Nurofen",
time:n.toISOString(),
done:false,
skip:false
});

n.setHours(n.getHours()+8);

}

}


if(type=="both"){

let n=new Date(start);

n.setHours(n.getHours()+2);

while(n<=end){

doses.push({
med:"Nurofen",
time:n.toISOString(),
done:false,
skip:false
});

n.setHours(n.getHours()+8);

}

}


save();
draw();

}


function taken(i){

doses[i].done=true;

save();
draw();

}


function skip(i){

doses[i].skip=true;

save();
draw();

}


function save(){

localStorage.doses=JSON.stringify(doses);

}


function draw(){

plan.innerHTML="";

doses.forEach((x,i)=>{

plan.innerHTML+=
"<div class=item>"+
(x.done?"✅ ":"")+
(x.skip?"⏭️ ":"")+
(x.med=="Calpol"?"🔴 ":"🟠 ")+
new Date(x.time).toLocaleTimeString()+
" "+x.med+

(!x.done&&!x.skip?
"<button class=green onclick='taken("+i+")'>Dose Taken</button>"+
"<button class=grey onclick='skip("+i+")'>Skip</button>"
:"")+

"</div>";

});

}


setInterval(()=>{

let nextDose=doses.find(x=>
!x.done&&!x.skip&&new Date(x.time)>new Date()
);

if(nextDose){

let diff=new Date(nextDose.time)-new Date();

next.innerHTML=
(nextDose.med=="Calpol"?"🔴 ":"🟠 ")+nextDose.med;

timer.innerHTML=
Math.floor(diff/3600000)+"h "+
Math.floor(diff%3600000/60000)+"m";

}

},1000);


draw();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Dose Pro</title>
<style>
body{font-family:-apple-system;background:#f2f2f7;padding:20px}
.card{background:white;padding:20px;border-radius:18px}
button{width:100%;padding:15px;margin:8px;border-radius:12px}
.button-group{display:flex;gap:10px;margin:8px 0}
.button-group button{flex:1;margin:0}
.dose-entry{background:#f9f9f9;padding:12px;margin:8px 0;border-radius:8px;border-left:4px solid #007AFF}
.history-entry{background:#f9f9f9;padding:10px;margin:6px 0;border-radius:8px}
</style>
</head>
<body>
<div class="card">
<h2>Calpol & Nurofen Scheduler Pro</h2>

<div class="button-group">
<button onclick="dose('Calpol',6)">Calpol (6h)</button>
<button onclick="dose('Nurofen',8)">Nurofen (8h)</button>
</div>

<div class="button-group">
<button onclick="doseSequence('Calpol',6,'Nurofen',2)">Calpol then Nurofen (2h later)</button>
<button onclick="doseSequence('Nurofen',8,'Calpol',2)">Nurofen then Calpol (2h later)</button>
</div>

<h3>Next Dose</h3>
<div id="next"></div>

<h3>History</h3>
<div id="history"></div>

<button onclick="exportData()">Export History</button>
</div>

<script>
if('serviceWorker' in navigator)
navigator.serviceWorker.register('service-worker.js');

if('Notification' in window)
Notification.requestPermission();

let log=JSON.parse(localStorage.getItem('log')||'[]');

function dose(name,h){
let now=new Date();
let next=new Date(Date.now()+h*3600000);

log.push({name:name,time:now,next:next});
localStorage.setItem('log',JSON.stringify(log));

draw();
}

function doseSequence(name1,h1,name2,h2){
let now=new Date();
let next1=new Date(Date.now()+h1*3600000);
let next2=new Date(Date.now()+(h1+h2)*3600000);

log.push({name:name1,time:now,next:next1,sequence:true});
log.push({name:name2,time:new Date(Date.now()+h1*3600000),next:next2,sequence:true});
localStorage.setItem('log',JSON.stringify(log));

draw();
}

function draw(){
history.innerHTML='';
next.innerHTML='';

log.forEach(x=>{
let entry='<div class="history-entry">'+x.name+' - '+new Date(x.time).toLocaleString();
if(x.sequence)entry+=' <small>[sequence]</small>';
entry+='</div>';
history.innerHTML+=entry;
});

log.slice(-2).forEach(x=>{
next.innerHTML+='<div class="dose-entry">'+x.name+' due '+new Date(x.next).toLocaleString()+'</div>';
});
}

setInterval(()=>{
let now=new Date();
log.forEach(x=>{
if(!x.done && now>=new Date(x.next)){
navigator.serviceWorker.ready.then(r=>
r.showNotification(x.name+' due'));
x.done=true;
localStorage.setItem('log',JSON.stringify(log));
}
});
},60000);

function exportData(){
let blob=new Blob([JSON.stringify(log)]);
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='dose-history.json';
a.click();
}

draw();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CalNur</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:20px}
.card{background:white;border-radius:22px;padding:20px;margin-bottom:15px}
button,select{
width:100%;padding:15px;border-radius:16px;margin:6px 0;font-size:16px
}
button{border:0;color:white}
.red{background:#d62828}
.orange{background:#f77f00}
.blue{background:#007aff}
.green{background:#34c759}
.grey{background:#555}
.item{background:#eee;border-radius:12px;padding:10px;margin:6px}
.done{opacity:.5;text-decoration:line-through}
.timer{text-align:center;font-size:32px;font-weight:bold}
.credit{text-align:center;font-size:9px;opacity:.45}
</style>
</head>

<body>

<div class="card">
<h2>💊 CalNur</h2>

<select id="hour"></select>
<select id="minute"></select>

<button class="green" onclick="setNow()">Use Current Time</button>

<button class="red" onclick="startPlan('calpol')">
🔴 Start Calpol Plan
</button>

<button class="orange" onclick="startPlan('nurofen')">
🟠 Start Nurofen Plan
</button>

<button class="blue" onclick="startPlan('both')">
🔴🟠 Start Calpol + Nurofen Plan
</button>

</div>


<div class="card">

<h3>⏰ Next Dose</h3>

<div id="next"></div>
<div id="timer" class="timer">--</div>

</div>


<div class="card">

<h3>📅 Today's Checklist</h3>

<div id="list"></div>

<button class="blue" onclick="showHistory()">📖 View History</button>

<button class="grey" onclick="clearData()">🗑 Clear Data</button>

</div>


<div class="card" id="historyBox" style="display:none">

<h3>📖 History</h3>

<div id="history"></div>

</div>


<div class="credit">
Created by AI genius Kamil K
</div>


<script>

let checklist=JSON.parse(localStorage.checklist||"[]");

let historyData=JSON.parse(localStorage.historyData||"[]");

let savedPlan=localStorage.planType||"";

let savedDate=localStorage.date||"";


for(let i=0;i<24;i++)
hour.innerHTML+="<option>"+String(i).padStart(2,'0')+"</option>";

for(let i=0;i<60;i++)
minute.innerHTML+="<option>"+String(i).padStart(2,'0')+"</option>";


function setNow(){

let d=new Date();

hour.value=String(d.getHours()).padStart(2,'0');

minute.value=String(d.getMinutes()).padStart(2,'0');

}

setNow();


// new day reset checklist but keep plan

let today=new Date().toDateString();

if(savedDate && savedDate!=today && savedPlan){

startPlan(savedPlan);

}

localStorage.date=today;


function startPlan(type){

localStorage.planType=type;

let start=new Date();

start.setHours(hour.value);

start.setMinutes(minute.value);

let end=new Date(start);
end.setHours(end.getHours()+24);

checklist=[];


if(type=="calpol"||type=="both"){

let c=new Date(start);

while(c<=end){

checklist.push({
med:"Calpol",
time:c.toISOString(),
done:false,
skip:false
});

c.setHours(c.getHours()+6);

}

}


if(type=="nurofen"){

let n=new Date(start);

while(n<=end){

checklist.push({
med:"Nurofen",
time:n.toISOString(),
done:false,
skip:false
});

n.setHours(n.getHours()+8);

}

}


if(type=="both"){

let n=new Date(start);
n.setHours(n.getHours()+2);

while(n<=end){

checklist.push({
med:"Nurofen",
time:n.toISOString(),
done:false,
skip:false
});

n.setHours(n.getHours()+8);

}

}


checklist.sort((a,b)=>new Date(a.time)-new Date(b.time));

save();
draw();

}


function taken(i){

checklist[i].done=true;

historyData.push({
med:checklist[i].med,
time:new Date().toISOString()
});

save();
draw();

}


function skip(i){

checklist[i].skip=true;

save();
draw();

}


function save(){

localStorage.checklist=JSON.stringify(checklist);

localStorage.historyData=JSON.stringify(historyData);

}


function draw(){

list.innerHTML="";

checklist
.sort((a,b)=>new Date(a.time)-new Date(b.time))
.forEach((x,i)=>{

list.innerHTML+=
"<div class='item "+(x.done?'done':'')+"'>"+ 
(x.done?"✅ ":"")+
(x.skip?"⏭️ ":"")+
(x.med=="Calpol"?"🔴 ":"🟠 ")+
new Date(x.time).toLocaleTimeString()+
" "+x.med+

(!x.done&&!x.skip?
"<button class=green onclick='taken("+i+")'>Dose Taken</button>"+
"<button class=grey onclick='skip("+i+")'>Skip</button>"
:"")+

"</div>";

});

}


function showHistory(){

historyBox.style.display="block";

history.innerHTML="";

historyData.forEach(x=>{

history.innerHTML+=
"<div class=item>"+
x.med+" "+
new Date(x.time).toLocaleString()+
"</div>";

});

}


function clearData(){

if(confirm("Clear all data?")){

localStorage.clear();
location.reload();

}

}


setInterval(()=>{

let nextDose=checklist.find(x=>
!x.done&&!x.skip&&new Date(x.time)>new Date()
);

if(nextDose){

let diff=new Date(nextDose.time)-new Date();

next.innerHTML=nextDose.med;

timer.innerHTML=
Math.floor(diff/3600000)+"h "+
Math.floor(diff%3600000/60000)+"m";

}

},1000);


draw();

</script>

</body>
</html>

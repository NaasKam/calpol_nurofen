<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Dose Scheduler</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:20px}
.card{background:white;border-radius:22px;padding:20px;margin-bottom:15px}
button{width:100%;padding:15px;border:0;border-radius:15px;margin:6px 0;color:white;font-size:16px}
.red{background:#d62828}
.orange{background:#f77f00}
.blue{background:#007aff}
.grey{background:#555}
.item{background:#eee;border-radius:12px;padding:10px;margin:5px}
</style>
</head>

<body>

<div class="card">
<h2>💊 Dose Scheduler</h2>

<button class="red" onclick="give('Calpol')">
Give Calpol Now
</button>

<button class="orange" onclick="give('Nurofen')">
Give Nurofen Now
</button>

<button class="blue" onclick="generatePlan()">
Generate 24 Hour Plan
</button>
</div>


<div class="card">

<h3>📅 24 Hour Plan</h3>
<div id="plan"></div>

<button class="blue" onclick="exportPlanPDF()">
Export 24 Hour Plan PDF
</button>

</div>


<div class="card">

<h3>📖 Dose History</h3>
<div id="history"></div>

<button class="grey" onclick="clearHistory()">
Delete History
</button>

</div>


<script>

let historyData=JSON.parse(localStorage.historyData||"[]");
let currentPlan=[];


function give(type){

let now=new Date();

historyData.push({
type:type,
time:now.toISOString()
});

localStorage.historyData=JSON.stringify(historyData);

drawHistory();

}


function drawHistory(){

history.innerHTML="";

historyData.forEach(x=>{

history.innerHTML +=
"<div class=item>"+
(x.type=="Calpol"?"🔴 ":"🟠 ")+
x.type+
"<br>"+
new Date(x.time).toLocaleString()
+"</div>";

});

}


function generatePlan(){

plan.innerHTML="";
currentPlan=[];

let lastCalpol=[...historyData]
.reverse()
.find(x=>x.type=="Calpol");

if(!lastCalpol){

alert("Please enter a Calpol dose first");
return;

}

let end=new Date(Date.now()+86400000);


// Calpol every 6 hours

let c=new Date(lastCalpol.time);

while(c<=end){

currentPlan.push({
type:"Calpol",
time:new Date(c)
});

c.setHours(c.getHours()+6);

}


// Nurofen always 2 hours after Calpol start

let n=new Date(lastCalpol.time);

n.setHours(n.getHours()+2);

while(n<=end){

currentPlan.push({
type:"Nurofen",
time:new Date(n)
});

n.setHours(n.getHours()+8);

}


currentPlan.sort((a,b)=>a.time-b.time);


currentPlan.forEach(x=>{

plan.innerHTML +=
"<div class=item>"+
(x.type=="Calpol"?"🔴 ":"🟠 ")+
x.time.toLocaleString()+
" - "+
x.type+
"</div>";

});

}


function exportPlanPDF(){

let text="24 Hour Dose Plan\\n\\n";

currentPlan.forEach(x=>{

text +=
x.time.toLocaleString()+
" - "+
x.type+
"\\n";

});


let w=window.open();

w.document.write("<pre>"+text+"</pre>");

w.print();

}


function clearHistory(){

if(confirm("Delete all dose history?")){

historyData=[];
localStorage.historyData="[]";

history.innerHTML="";
plan.innerHTML="";
currentPlan=[];

}

}


drawHistory();

</script>

</body>
</html>
